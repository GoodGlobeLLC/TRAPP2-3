# ============================================================
#  >>> DESTINATION: GoodGlobeLLC/TRAPP2-1  (and TRAPP2, TRAPP2-2, TRAPP2-3)
#  >>> FILE PATH:   .github/workflows/history-20y.yml
#
#  WHY THIS REPLACES THE BATCHED VERSION
#  -------------------------------------
#  The old workflow ran 4 parallel batches that pushed to the same repo. On a
#  push conflict each batch did `git merge -X ours` + `git checkout --ours --
#  data/history/`, which made THAT batch's view of the whole history/ folder win
#  — silently reverting the files the other batches had just pushed but that this
#  batch never had locally. That's why files dropped out, why it looked random,
#  and why re-running "eventually" filled them in (different batches won the race
#  each time).
#
#  This version runs ONE sequential job over the WHOLE universe and commits once.
#  No parallel push, no race, every ticker in a single commit. The fetcher skips
#  tickers already current (--max-age-days 1), so after the first full backfill
#  each daily run is cheap. It also PRUNES orphan history files (tickers removed
#  from tickers.txt) on every full pass, so stale equities can't keep feeding the
#  app. The commit/push is scoped to data/history/ + the manifest ONLY, so it can
#  never revert another workflow's master/leadership/signals files.
# ============================================================

name: Refresh 20-Year History (Single Pass)

on:
  schedule:
    - cron: '0 7 * * *'        # 07:00 UTC daily — after US close + nightly settle
  workflow_dispatch:
    inputs:
      years:
        description: 'Years of history to fetch'
        required: false
        default: '20'
      force:
        description: 'Refetch even fresh tickers (full backfill)'
        type: boolean
        required: false
        default: false
      prune:
        description: 'Delete orphan history files no longer in tickers.txt'
        type: boolean
        required: false
        default: true

permissions:
  contents: write

# Never run two history passes at once, and don't cancel a long backfill.
concurrency:
  group: history-20y
  cancel-in-progress: false

jobs:
  fetch-history:
    runs-on: ubuntu-latest
    # A full 20-year backfill of ~340 tickers fits comfortably; the ceiling is
    # generous so the first big run can't be killed. Daily incremental runs take
    # only a few minutes because fresh tickers are skipped.
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install requirements
        run: pip install yfinance

      - name: Fetch ALL history in one pass
        run: |
          YEARS="${{ github.event.inputs.years || '20' }}"
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE="--force"; fi
          PRUNE=""
          # default prune ON; only disable if the user explicitly set prune=false
          if [ "${{ github.event.inputs.prune }}" = "false" ]; then PRUNE="--no-prune"; fi
          # --of 1 = single pass over the WHOLE universe (no batch race).
          # --max-age-days 1 = skip tickers already ending yesterday (fast daily
          # top-up after the first backfill). force=true ignores freshness.
          python pipeline/fetch_history.py --of 1 --years "$YEARS" --max-age-days 1 $PRUNE $FORCE

      - name: Commit & push (history scope only, retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage history files + the manifest INCLUDING deletions (orphan prune).
          # Scoped to these paths ONLY so this job can never touch master/
          # leadership/signals and can't revert another workflow.
          git add -A data/history/ data/history_manifest.json
          if git diff --staged --quiet; then
            echo "No history changes to commit"
            exit 0
          fi
          git commit -m "20y history (single pass) $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # Single job, but another workflow (nightly/quotes) may have pushed
          # meanwhile. Retry with a history-scoped OURS resolution so our freshly
          # fetched bars + prune win for history files, and nothing else is touched.
          for i in 1 2 3 4 5 6; do
            if git push; then
              echo "Pushed on attempt $i"
              break
            fi
            echo "Push attempt $i failed — merging remote (history scope OURS)"
            git fetch origin
            git merge -X ours origin/${{ github.ref_name }} 2>/dev/null || true
            if [ -f .git/MERGE_HEAD ]; then
              git checkout --ours -- data/history/ data/history_manifest.json 2>/dev/null || true
              git add -A data/history/ data/history_manifest.json 2>/dev/null || true
              git commit --no-edit 2>/dev/null || true
            fi
            sleep 5
          done

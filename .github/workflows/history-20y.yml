#
#  WHAT CHANGED IN THIS FILE:
#    Now runs DAILY (cron 07:00 UTC) as an INCREMENTAL top-up: it fetches
#    20 years ago through YESTERDAY and appends the newly-settled bar,
#    skipping any ticker already current (--max-age-days 1). The first run
#    does the full 20-year backfill; every run after is fast. ALSO:
#    conflict-recovery + manifest commit are scoped to data/history/ +
#    manifest ONLY (never blanket data/, so it can't revert leadership/
#    master/signals on overlap). NOT triggered by full-refresh.yml — it
#    self-schedules daily.
# ============================================================

name: Refresh 20-Year History (Batched)

# Fetches up to 20 years of daily price history for the whole ticker universe,
# split into 4 parallel batches so no single run hits Yahoo rate limits, runs for
# hours, or produces one giant commit. Each batch fetches a stripe of the tickers
# (batch i handles ticker indices i, i+4, i+8, …), writes only its own per-ticker
# files, and MERGES the shared manifest so batches never clobber each other.
#
# The full 20y backfill is heavy, so this runs WEEKLY (history doesn't change
# retroactively — only the latest day is new). The nightly workflow's lighter
# 5-day-tail top-up keeps recent data current between full refreshes. Trigger by
# hand for the initial backfill or after adding many tickers.
#
# Note: skip-if-fresh means a weekly run mostly no-ops on tickers already current,
# so steady-state cost is low; the expensive pass is the first backfill.

on:
  schedule:
    # DAILY. Runs after the US close + nightly so yesterday's bar is settled.
    # The job is incremental: tickers already ending yesterday are skipped
    # instantly (see --max-age-days below), so after the first full backfill each
    # daily run is cheap — it only appends the newly-settled day per ticker.
    - cron: '0 7 * * *'        # 07:00 UTC daily
  workflow_dispatch:
    inputs:
      years:
        description: 'Years of history to fetch'
        required: false
        default: '20'
      force:
        description: 'Refetch even fresh tickers (full backfill)'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

# Allow the batches to run; do NOT cancel in-progress (a long backfill shouldn't
# be killed by the next schedule).
concurrency:
  group: history-20y
  cancel-in-progress: false

jobs:
  fetch-history:
    runs-on: ubuntu-latest
    timeout-minutes: 330      # 5.5h ceiling for a heavy backfill stripe
    strategy:
      # IMPORTANT: max-parallel limits concurrent pushes to the same repo. 4 is
      # fine with the OURS-wins safe-push below. fail-fast off so one bad stripe
      # doesn't abort the others.
      fail-fast: false
      max-parallel: 4
      matrix:
        batch: [0, 1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install requirements
        run: pip install yfinance

      - name: Fetch history (batch ${{ matrix.batch }} of 4)
        run: |
          YEARS="${{ github.event.inputs.years || '20' }}"
          FORCE=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FORCE="--force"; fi
          # --max-age-days 1: on a DAILY run, skip a ticker only if its stored
          # history already ends within 1 day of today (i.e. it already has
          # yesterday's bar); otherwise fetch and append the newly-settled day.
          # This makes the daily run a fast incremental top-up after the first
          # full 20-year backfill. (A manual run with force=true ignores this and
          # refetches everything.)
          python pipeline/fetch_history.py --batch ${{ matrix.batch }} --of 4 --years "$YEARS" --max-age-days 1 $FORCE

      - name: Commit & push (OURS-wins, retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/history/ data/history_manifest.json
          if git diff --staged --quiet; then
            echo "Batch ${{ matrix.batch }}: no history changes to commit"
            exit 0
          fi
          git commit -m "20y history batch ${{ matrix.batch }}/4 $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          # Parallel batches push to the same repo. On conflict, OURS wins for the
          # data files (generated JSON can't be hand-merged). The manifest merge
          # is handled in Python (each batch reads+merges before writing), but if
          # two batches race on the manifest file itself, last-writer's content
          # still contains its own tickers; a subsequent run reconciles. Retry a
          # few times to ride out concurrent pushes.
          for i in 1 2 3 4 5 6; do
            if git push; then
              echo "Batch ${{ matrix.batch }}: push succeeded on attempt $i"
              break
            fi
            echo "Batch ${{ matrix.batch }}: push attempt $i failed — merging remote (OURS wins)"
            git fetch origin
            # Merge the remote in, but resolve conflicts ONLY within the history
            # files — never touch other data/ files (leadership, master.csv,
            # signals, etc.). This is the key fix: a blanket `checkout --ours --
            # data/` could revert another workflow's fresh data. We scope strictly
            # to data/history/ and the manifest so history-20y can only ever write
            # its OWN files.
            git merge -X ours origin/main 2>/dev/null || git merge -X ours origin/master 2>/dev/null || true
            if [ -f .git/MERGE_HEAD ]; then
              git checkout --ours -- data/history/ data/history_manifest.json data/history_manifest.b*.json 2>/dev/null || true
              git add -- data/history/ data/history_manifest.json data/history_manifest.b*.json 2>/dev/null || true
              git commit --no-edit 2>/dev/null || true
            fi
            sleep 5
          done

  # After all batches finish, combine their fragments into the authoritative
  # manifest. Runs once, sequentially, so there's no manifest race here.
  merge-manifest:
    needs: fetch-history
    if: always()        # run even if one batch failed — merge whatever succeeded
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pull latest (batches just pushed)
        run: git pull --no-rebase -X ours origin ${{ github.ref_name }} || true

      - name: Merge manifest fragments
        run: python pipeline/merge_manifest.py

      - name: Commit & push merged manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Stage ONLY the history manifest + any fragment deletions
          # merge_manifest.py made — never blanket-stage data/, so this job can't
          # accidentally commit (and then OURS-overwrite) another workflow's
          # files. `git add -A <paths>` includes deletions for those paths; the
          # `|| true` means an absent fragment can't crash the step (the old
          # bare-glob `did not match` exit-128 bug stays fixed).
          git add -A data/history_manifest.json 2>/dev/null || true
          git add -A data/history/ 2>/dev/null || true
          # stage fragment deletions explicitly (if any remain)
          for frag in data/history_manifest.b*.json; do
            [ -e "$frag" ] || git rm --cached --ignore-unmatch "$frag" 2>/dev/null || true
          done
          if git diff --staged --quiet; then
            echo "No manifest changes"
            exit 0
          fi
          git commit -m "Merge 20y history manifest $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then echo "Pushed on attempt $i"; break; fi
            git fetch origin
            git merge -X ours origin/${{ github.ref_name }} 2>/dev/null || true
            # keep conflict resolution scoped to history files only
            if [ -f .git/MERGE_HEAD ]; then
              git checkout --ours -- data/history/ data/history_manifest.json 2>/dev/null || true
              git add -- data/history/ data/history_manifest.json 2>/dev/null || true
              git commit --no-edit 2>/dev/null || true
            fi
            sleep 4
          done

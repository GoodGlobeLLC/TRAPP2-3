#  >>> DESTINATION: GoodGlobeLLC/TRAPP2  (.github/workflows/nightly.yml — REPLACE)
name: Nightly Full Refresh

# TRAPP2 is the US-EQUITIES repo. This nightly does EQUITIES data only:
#   quotes + fundamentals → 5-year price history.
#
# The macro/FRED pull, signal stack, regime classification, Markov transitions,
# and ETF holdings have been REMOVED from here — those belong to the FX/global
# repo (TRAPP2-1), which already runs the full macro → signals → regime →
# transitions chain in its own nightly. Keeping them here was redundant work and
# caused two repos to publish competing regime_current.json snapshots (the
# "regime flips between refreshes" race). The app reads macro + regime from
# TRAPP2-1 now, so this repo no longer needs to produce them.
#
# 00:30 UTC = 8:30 PM ET (EDT). Runs after US close, before pre-market data.

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:

concurrency:
  group: trapp2-equities-nightly
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install core requirements (must succeed)
        run: pip install requests pandas "yfinance>=0.2.50,<0.3"

      - name: Fetch quotes + fundamentals
        run: python pipeline/fetch_data.py

      - name: Top up price history (incremental — appends latest settled day only)
        # History backfill (full 20 years) is owned by history-20y.yml, which runs
        # daily in 4 batches. Here we only append the newest settled day to tickers
        # already current, so nightly stays fast and never triggers a full refetch.
        # --max-age-days 1 = skip any ticker whose history already ends yesterday.
        run: python pipeline/fetch_history.py --max-age-days 1

      # NOTE (removed — now in TRAPP2-1, the FX/global repo):
      #   - Fetch FRED macro series      (pipeline/fetch_macro.py)
      #   - Compute signals              (pipeline/compute_signals.py)
      #   - Classify regime + snapshot   (pipeline/classify_regime.py)
      #   - Compute Markov transitions   (pipeline/compute_transitions.py)
      #   - Fetch ETF holdings           (pipeline/fetch_etf_holdings.py)
      # Company facts + leadership run on their own clocks (company-facts.yml,
      # leadership*.yml). This nightly is now purely equities market data.

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          if git diff --staged --quiet; then
            echo "No nightly changes to commit"
          else
            git commit -m "Nightly equities refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            # Generated data — on conflict with a parallel run, OURS wins. Never
            # hand-rebase JSON (git can't auto-merge it; that was the exit-128 cause).
            for i in 1 2 3 4 5; do
              if git push; then
                echo "Push succeeded on attempt $i"
                break
              fi
              echo "Push attempt $i failed — merging remote with OURS winning conflicts"
              git fetch origin
              git merge -X ours origin/main 2>/dev/null || git merge -X ours origin/master 2>/dev/null || true
              if [ -d .git/rebase-merge ] || [ -f .git/MERGE_HEAD ]; then
                git checkout --ours -- data/ 2>/dev/null || true
                git add -A data/ 2>/dev/null || true
                git commit --no-edit 2>/dev/null || true
              fi
              sleep 4
            done
          fi
